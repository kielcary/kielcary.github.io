# Site setings
name: 'Kiel Cary'
description: 'Blogging from Grace.'
meta_description: 'A blog for the members and visitors of Grace Fellowship - a gospel community in McCook, Nebraska.'
logo:
# Author image is used in site sidebar and greetings in the home page hero text
author:
  image: 'authorimage.jpg'
  greetings: "Welcome to Blogging from Grace - a blog for the members and visitors of Grace Fellowship in McCook, Nebraska."
favicon: 'assets/images/favicon.ico'
baseurl: 
production_url: https://www.blogginfromgrace.com/
#disqus: 'justgoodthemes'
#mailchimp_url: '//justgoodthemes.us3.list-manage.com/subscribe/post?u=78f1bab16028354caeb23aecd&amp;id=4a7330d117'
# Add your GA Tracking Id
ga_analytics: 

# Contact form setings
email: kiel@gracefellowship.com
#contact_page_description: "Horace theme comes with a contact form built-in. You can use this form with Formspree service and get up to 50 submissions for free. Also, you can easily switch to another service if you want."
#thankyou_page_description: "Your message has been successfully sent. We will contact you very soon!"

# Social links
facebook: 'kielcary'
github: 'kielcary'
linkedin: 'kielary'

# Navigation
navigation:
  - text: Home
    url: /
  - text: About
    url: /about
  - text: Style Guide
    url: /style-guide
  - text: Contact Me
    url: /contact

# Required Plugins
plugins_dir:
  - jekyll-paginate
  - jekyll-tagsgenerator
  - jekyll-seo-tag
  - jekyll-sitemap

# Pagination
paginate: 5
paginate_path: /page:num/

# Permalinks
permalink: /:title

# Other
markdown: kramdown

# Sass
sass:
  sass_dir: _sass
  style: compressed
